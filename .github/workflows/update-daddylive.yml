name: Update DaddyLive M3U

on:
  schedule:
    - cron: '0 */2 * * *'     # Her 2 saatte bir
  workflow_dispatch:          # Manuel çalıştırmak istersen

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: python update_playlist.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes detected."
          else
            git add daddylive.m3u
            git commit -m "Update daddylive.m3u - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "Changes committed and pushed."
          fi
