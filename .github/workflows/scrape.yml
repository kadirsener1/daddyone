name: DaddyLive M3U8 Scraper

on:
  # 2 saatte bir otomatik çalış
  schedule:
    - cron: '0 */2 * * *'  # Her 2 saatte bir
  
  # Manuel tetikleme
  workflow_dispatch:
  
  # Push ile de tetiklenebilir
  push:
    branches: [ main ]
    paths:
      - 'scraper.py'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # 1. Repo'yu checkout et
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python kur
      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Chrome ve ChromeDriver kur
      - name: 🌐 Chrome kurulumu
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: 🔧 ChromeDriver kurulumu
        run: |
          # Chrome versiyonunu al
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VERSION"
          
          # ChromeDriver'ı kur
          sudo apt-get update
          sudo apt-get install -y chromium-chromedriver || true
          
          # PATH'e ekle
          export PATH=$PATH:/usr/lib/chromium-browser/
          echo "/usr/lib/chromium-browser/" >> $GITHUB_PATH

      # 4. Python bağımlılıklarını kur
      - name: 📦 Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Scraper'ı çalıştır
      - name: 🔍 Scraper'ı çalıştır
        run: |
          python scraper.py
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: 1

      # 6. Sonuçları kontrol et
      - name: 📋 Sonuçları göster
        run: |
          echo "=========================================="
          echo "playlist.m3u dosyası içeriği:"
          echo "=========================================="
          if [ -f playlist.m3u ]; then
            cat playlist.m3u
            echo ""
            echo "Dosya boyutu: $(wc -c < playlist.m3u) byte"
            echo "Toplam satır: $(wc -l < playlist.m3u)"
            echo "M3U8 link sayısı: $(grep -c '.m3u8' playlist.m3u || echo 0)"
          else
            echo "playlist.m3u dosyası bulunamadı!"
          fi

      # 7. Değişiklikleri commit et ve push et
      - name: 📤 Değişiklikleri commit et
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Dosyayı ekle
          git add playlist.m3u
          
          # Değişiklik var mı kontrol et
          if git diff --staged --quiet; then
            echo "Değişiklik yok, commit yapılmayacak."
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')
            LINK_COUNT=$(grep -c '.m3u8' playlist.m3u 2>/dev/null || echo 0)
            git commit -m "🔄 Playlist güncellendi: ${TIMESTAMP} - ${LINK_COUNT} stream"
            git push
            echo "✅ Değişiklikler push edildi!"
          fi

      # 8. Artifact olarak da kaydet (yedek)
      - name: 💾 Artifact olarak kaydet
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playlist-${{ github.run_number }}
          path: playlist.m3u
          retention-days: 7
